<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>HYESEUNG'S SKY</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      overflow: hidden;
      touch-action: none;
    }

    #domeCanvas {
      display: block;
      width: 100%;
      height: 100dvh;
      touch-action: none;
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    /* 상단 제목 */
    .sky-header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 10;
      text-align: center;
      padding: 50px 20px 20px;
      background: linear-gradient(to bottom, rgba(5,8,16,0.7) 0%, rgba(5,8,16,0.3) 60%, transparent 100%);
      pointer-events: none;
    }

    .sky-header h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 20px;
      font-weight: 300;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 8px;
    }

    .sky-header h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 36px;
      font-weight: 300;
      font-style: italic;
      color: var(--text);
      line-height: 1.3;
      margin-bottom: 8px;
    }

    .sky-counter {
      font-size: 12px;
      color: var(--text-dim);
    }

    .sky-counter span {
      color: var(--accent);
      font-weight: 500;
    }

    /* 힌트 */
    .hint {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      color: rgba(200,220,255,0.4);
      pointer-events: none;
      z-index: 10;
      transition: opacity 1s;
      text-align: center;
      line-height: 1.6;
    }

    /* 하단 고정 바 */
    .bottom-bar {
      pointer-events: auto;
      z-index: 10;
    }

    /* 별자리 정보 팝업 */
    .constellation-popup {
      position: fixed;
      left: 50%;
      bottom: 160px;
      transform: translateX(-50%);
      z-index: 20;
      width: calc(100% - 48px);
      max-width: 340px;
      background: rgba(10, 14, 28, 0.9);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 16px;
      padding: 20px 24px;
      backdrop-filter: blur(12px);
      pointer-events: auto;
      animation: popup-in 0.25s ease-out;
    }

    @keyframes popup-in {
      from { opacity: 0; transform: translateX(-50%) translateY(8px); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0); }
    }

    .constellation-popup .popup-close {
      position: absolute;
      top: 12px;
      right: 16px;
      background: none;
      border: none;
      color: var(--text-dim);
      font-size: 16px;
      cursor: pointer;
      padding: 4px;
    }

    .constellation-popup .popup-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 20px;
      font-weight: 400;
      font-style: italic;
      margin-bottom: 8px;
    }

    .constellation-popup .popup-message {
      font-size: 13px;
      color: var(--text);
      line-height: 1.6;
      word-break: break-word;
      margin-bottom: 8px;
    }

    .constellation-popup .popup-date {
      font-size: 11px;
      color: var(--text-dim);
    }

    .constellation-popup .popup-empty {
      font-size: 13px;
      font-style: italic;
      color: var(--text-dim);
    }
  </style>
</head>
<body>
  <canvas id="domeCanvas"></canvas>

  <!-- 힌트 -->
  <div class="hint" id="hint">
    드래그하여 밤하늘을 둘러보세요<br/>
    별자리를 클릭하면 메시지를 볼 수 있어요<br/>
    <span style="font-size: 20px; opacity: 0.5;">↔ ↕</span>
  </div>

  <!-- 헤더 -->
  <div class="sky-header fade-in">
    <h1>Happy Birthday</h1>
    <h2>For Hyeseung</h2>
    <div class="sky-counter">
      <span id="totalCount">0</span>개의 별자리가 빛나고 있어요
    </div>
  </div>

  <!-- 별자리 정보 팝업 -->
  <div class="constellation-popup hidden" id="constellationPopup">
    <button class="popup-close" id="popupClose">✕</button>
    <div class="popup-name" id="popupName"></div>
    <div class="popup-message" id="popupMessage"></div>
    <div class="popup-date" id="popupDate"></div>
  </div>

  <!-- 하단 바 -->
  <div class="bottom-bar">
    <a href="draw.html" class="btn-primary">
      ✦ 별자리 만들기
    </a>
    <div class="nav-row">
      <a href="guestbook.html" class="btn-ghost">방명록</a>
    </div>
  </div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import {
      db, collection, query, orderBy, onSnapshot
    } from './firebase-config.js';

    // ===== 씬 설정 =====
    const canvas = document.getElementById('domeCanvas');
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(canvas.clientWidth, canvas.clientHeight);

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x050810);

    const camera = new THREE.PerspectiveCamera(75, canvas.clientWidth / canvas.clientHeight, 0.1, 1000);
    camera.position.set(0, 0, 0);

    // ===== 배경 별들 =====
    const starCount = 2000;
    const starGeo = new THREE.BufferGeometry();
    const starPositions = new Float32Array(starCount * 3);
    const starSizes = new Float32Array(starCount);

    for (let i = 0; i < starCount; i++) {
      const theta = Math.random() * Math.PI * 2;
      const phi = Math.acos(2 * Math.random() - 1);
      const r = 80;
      starPositions[i * 3]     = r * Math.sin(phi) * Math.cos(theta);
      starPositions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
      starPositions[i * 3 + 2] = r * Math.cos(phi);
      starSizes[i] = 0.5 + Math.random() * 2;
    }

    starGeo.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
    starGeo.setAttribute('size', new THREE.BufferAttribute(starSizes, 1));

    const starMat = new THREE.ShaderMaterial({
      uniforms: { uTime: { value: 0 } },
      vertexShader: `
        attribute float size;
        varying float vSize;
        varying float vRand;
        void main() {
          vSize = size;
          vRand = fract(sin(dot(position.xy, vec2(12.9898, 78.233))) * 43758.5453);
          vec4 mvPos = modelViewMatrix * vec4(position, 1.0);
          gl_PointSize = size * (200.0 / -mvPos.z);
          gl_Position = projectionMatrix * mvPos;
        }
      `,
      fragmentShader: `
        uniform float uTime;
        varying float vSize;
        varying float vRand;
        void main() {
          float d = length(gl_PointCoord - 0.5) * 2.0;
          if (d > 1.0) discard;
          float alpha = (1.0 - d * d) * (0.5 + 0.5 * sin(uTime * (1.0 + vRand * 2.0) + vRand * 6.28));
          gl_FragColor = vec4(0.94, 0.96, 1.0, alpha * 0.8);
        }
      `,
      transparent: true,
      depthWrite: false,
    });

    scene.add(new THREE.Points(starGeo, starMat));

    // ===== 성운 (Nebula) — 은은한 컬러 구름 =====
    const nebulaCount = 8;
    function createNebulaTexture(r, g, b) {
      const size = 128;
      const c = document.createElement('canvas');
      c.width = size; c.height = size;
      const ctx = c.getContext('2d');
      const grad = ctx.createRadialGradient(size/2, size/2, 0, size/2, size/2, size/2);
      grad.addColorStop(0, `rgba(${r},${g},${b},0.12)`);
      grad.addColorStop(0.4, `rgba(${r},${g},${b},0.04)`);
      grad.addColorStop(1, `rgba(${r},${g},${b},0)`);
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, size, size);
      return new THREE.CanvasTexture(c);
    }

    const nebulaColors = [
      [80, 100, 180], [140, 80, 160], [60, 120, 160],
      [160, 100, 120], [80, 140, 130], [120, 90, 170],
      [100, 80, 150], [70, 110, 160],
    ];

    for (let i = 0; i < nebulaCount; i++) {
      const [nr, ng, nb] = nebulaColors[i];
      const tex = createNebulaTexture(nr, ng, nb);
      const mat = new THREE.SpriteMaterial({
        map: tex, transparent: true, opacity: 0.6, depthWrite: false,
      });
      const sprite = new THREE.Sprite(mat);
      const theta = Math.random() * Math.PI * 2;
      const phi = Math.acos(2 * Math.random() - 1);
      const r = 70;
      sprite.position.set(
        r * Math.sin(phi) * Math.cos(theta),
        r * Math.sin(phi) * Math.sin(theta),
        r * Math.cos(phi)
      );
      const s = 20 + Math.random() * 25;
      sprite.scale.set(s, s, 1);
      scene.add(sprite);
    }

    // ===== 유성 (Shooting Stars) =====
    const METEOR_COUNT = 15;
    const meteors = [];

    const meteorMat = new THREE.ShaderMaterial({
      uniforms: {},
      vertexShader: `
        attribute float alpha;
        varying float vAlpha;
        void main() {
          vAlpha = alpha;
          vec4 mvPos = modelViewMatrix * vec4(position, 1.0);
          gl_Position = projectionMatrix * mvPos;
        }
      `,
      fragmentShader: `
        varying float vAlpha;
        void main() {
          gl_FragColor = vec4(0.9, 0.95, 1.0, vAlpha);
        }
      `,
      transparent: true,
      depthWrite: false,
    });

    function spawnMeteor() {
      // 구 표면의 랜덤 시작점
      const theta = Math.random() * Math.PI * 2;
      const phi = Math.acos(2 * Math.random() - 1);
      const r = 75;
      const start = new THREE.Vector3(
        r * Math.sin(phi) * Math.cos(theta),
        r * Math.sin(phi) * Math.sin(theta),
        r * Math.cos(phi)
      );

      // 이동 방향 (접선 + 약간 아래)
      const tangent = new THREE.Vector3(-Math.sin(theta), -0.5, Math.cos(theta)).normalize();
      const speed = 0.4 + Math.random() * 0.3;
      const tailLength = 12;
      const trailPoints = tailLength;

      // 트레일 지오메트리
      const positions = new Float32Array(trailPoints * 3);
      const alphas = new Float32Array(trailPoints);
      for (let i = 0; i < trailPoints; i++) {
        positions[i * 3] = start.x;
        positions[i * 3 + 1] = start.y;
        positions[i * 3 + 2] = start.z;
        alphas[i] = 0;
      }

      const geo = new THREE.BufferGeometry();
      geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      geo.setAttribute('alpha', new THREE.BufferAttribute(alphas, 1));

      const line = new THREE.Line(geo, meteorMat.clone());
      scene.add(line);

      return {
        line, geo, start: start.clone(), dir: tangent,
        speed, head: start.clone(), life: 0,
        maxLife: 1.5 + Math.random(), trailPoints,
        delay: Math.random() * 8,
      };
    }

    for (let i = 0; i < METEOR_COUNT; i++) {
      meteors.push(spawnMeteor());
    }

    function updateMeteors(dt) {
      for (let m = 0; m < meteors.length; m++) {
        const meteor = meteors[m];

        if (meteor.delay > 0) {
          meteor.delay -= dt;
          continue;
        }

        meteor.life += dt;
        meteor.head.add(meteor.dir.clone().multiplyScalar(meteor.speed));

        const positions = meteor.geo.attributes.position.array;
        const alphas = meteor.geo.attributes.alpha.array;

        // 트레일 좌표를 뒤로 밀기
        for (let i = meteor.trailPoints - 1; i > 0; i--) {
          positions[i * 3]     = positions[(i - 1) * 3];
          positions[i * 3 + 1] = positions[(i - 1) * 3 + 1];
          positions[i * 3 + 2] = positions[(i - 1) * 3 + 2];
        }
        positions[0] = meteor.head.x;
        positions[1] = meteor.head.y;
        positions[2] = meteor.head.z;

        // 페이드: 머리 밝고 꼬리 어둡게
        const fadeOut = meteor.life > meteor.maxLife * 0.7
          ? 1 - (meteor.life - meteor.maxLife * 0.7) / (meteor.maxLife * 0.3) : 1;
        for (let i = 0; i < meteor.trailPoints; i++) {
          alphas[i] = Math.max(0, (1 - i / meteor.trailPoints) * 0.6 * fadeOut);
        }

        meteor.geo.attributes.position.needsUpdate = true;
        meteor.geo.attributes.alpha.needsUpdate = true;

        // 수명 끝나면 재생성
        if (meteor.life > meteor.maxLife) {
          scene.remove(meteor.line);
          meteor.geo.dispose();
          meteor.line.material.dispose();
          meteors[m] = spawnMeteor();
          meteors[m].delay = 2 + Math.random() * 6;
        }
      }
    }

    // ===== 별자리 그룹 =====
    const constellationGroup = new THREE.Group();
    scene.add(constellationGroup);
    const DOME_RADIUS = 60;

    // 색상 문자열 파싱
    function parseColor(color) {
      if (!color) return [200, 220, 255];
      const m = color.match(/(\d+)\s*,\s*(\d+)\s*,\s*(\d+)/);
      return m ? [+m[1], +m[2], +m[3]] : [200, 220, 255];
    }

    // 글로우 텍스처
    function createGlowTexture(r, g, b) {
      const size = 64;
      const c = document.createElement('canvas');
      c.width = size; c.height = size;
      const ctx = c.getContext('2d');
      const grad = ctx.createRadialGradient(size/2, size/2, 0, size/2, size/2, size/2);
      grad.addColorStop(0, `rgba(${r},${g},${b},1)`);
      grad.addColorStop(0.3, `rgba(${r},${g},${b},0.4)`);
      grad.addColorStop(1, `rgba(${r},${g},${b},0)`);
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, size, size);
      return new THREE.CanvasTexture(c);
    }

    // 라벨 텍스처
    function createLabelTexture(text, r, g, b) {
      const c = document.createElement('canvas');
      c.width = 256; c.height = 64;
      const ctx = c.getContext('2d');
      ctx.font = 'italic 28px Cormorant Garamond, Georgia, serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = `rgba(${r},${g},${b},0.7)`;
      ctx.fillText(text, 128, 32);
      return new THREE.CanvasTexture(c);
    }

    // 별자리를 돔에 배치
    function buildConstellations(entries) {
      // 기존 오브젝트 제거
      while (constellationGroup.children.length > 0) {
        const child = constellationGroup.children[0];
        if (child.geometry) child.geometry.dispose();
        if (child.material) {
          if (child.material.map) child.material.map.dispose();
          child.material.dispose();
        }
        constellationGroup.remove(child);
      }

      const golden = 0.618033988749895;

      entries.forEach((entry, idx) => {
        if (!entry.stars || entry.stars.length === 0) return;

        const [cr, cg, cb] = parseColor(entry.color);
        const color = new THREE.Color(`rgb(${cr},${cg},${cb})`);

        // 골든 비율로 구 표면에 분산
        const theta = idx * golden * Math.PI * 2;
        const phi = Math.acos(1 - 2 * ((idx * golden) % 1));

        const centerDir = new THREE.Vector3(
          Math.sin(phi) * Math.cos(theta),
          Math.sin(phi) * Math.sin(theta),
          Math.cos(phi)
        ).normalize();

        // 접선면 로컬 좌표계
        const up = new THREE.Vector3(0, 1, 0);
        const right = new THREE.Vector3().crossVectors(up, centerDir).normalize();
        if (right.length() < 0.01) right.set(1, 0, 0);
        const localUp = new THREE.Vector3().crossVectors(centerDir, right).normalize();

        const starScale = 14;

        // 별점 3D 좌표
        const pts3d = entry.stars.map(s => {
          const lx = (s.x - 0.5) * starScale;
          const ly = (s.y - 0.5) * starScale;
          return centerDir.clone().multiplyScalar(DOME_RADIUS)
            .add(right.clone().multiplyScalar(lx))
            .add(localUp.clone().multiplyScalar(-ly));
        });

        // 연결선
        const lineGeo = new THREE.BufferGeometry().setFromPoints(pts3d);
        const lineMat = new THREE.LineBasicMaterial({
          color, transparent: true, opacity: 0.25,
        });
        constellationGroup.add(new THREE.Line(lineGeo, lineMat));

        // 글로우 스프라이트
        const dotTexture = createGlowTexture(cr, cg, cb);
        pts3d.forEach(pos => {
          const spriteMat = new THREE.SpriteMaterial({
            map: dotTexture, transparent: true, opacity: 0.9, depthWrite: false,
          });
          const sprite = new THREE.Sprite(spriteMat);
          sprite.position.copy(pos);
          sprite.scale.set(2.5, 2.5, 1);
          sprite.userData.entry = entry;
          constellationGroup.add(sprite);
        });

        // 이름 라벨
        if (entry.name) {
          const labelTexture = createLabelTexture(entry.name, cr, cg, cb);
          const labelMat = new THREE.SpriteMaterial({
            map: labelTexture, transparent: true, opacity: 0.6, depthWrite: false,
          });
          const label = new THREE.Sprite(labelMat);
          const labelPos = centerDir.clone().multiplyScalar(DOME_RADIUS)
            .add(localUp.clone().multiplyScalar(starScale * 0.5));
          label.position.copy(labelPos);
          label.scale.set(6, 1.8, 1);
          constellationGroup.add(label);
        }
      });
    }

    // ===== 레이캐스터 (별자리 클릭 감지) =====
    const raycaster = new THREE.Raycaster();
    const pointer = new THREE.Vector2();
    const popup = document.getElementById('constellationPopup');
    const popupName = document.getElementById('popupName');
    const popupMessage = document.getElementById('popupMessage');
    const popupDate = document.getElementById('popupDate');

    document.getElementById('popupClose').addEventListener('click', () => {
      popup.classList.add('hidden');
    });

    function formatDate(timestamp) {
      if (!timestamp) return '';
      const d = timestamp.toDate ? timestamp.toDate() : new Date(timestamp);
      const yyyy = d.getFullYear();
      const mm = String(d.getMonth() + 1).padStart(2, '0');
      const dd = String(d.getDate()).padStart(2, '0');
      return `${yyyy}.${mm}.${dd}`;
    }

    function showPopup(entry) {
      const [cr, cg, cb] = parseColor(entry.color);
      popupName.textContent = entry.name || '이름 없는 별자리';
      popupName.style.color = `rgb(${cr},${cg},${cb})`;

      if (entry.message) {
        popupMessage.textContent = entry.message;
        popupMessage.classList.remove('popup-empty');
      } else {
        popupMessage.textContent = '메시지가 없습니다';
        popupMessage.classList.add('popup-empty');
      }

      popupDate.textContent = formatDate(entry.timestamp);
      popup.classList.remove('hidden');
    }

    function raycastConstellation(clientX, clientY) {
      const rect = canvas.getBoundingClientRect();
      pointer.x = ((clientX - rect.left) / rect.width) * 2 - 1;
      pointer.y = -((clientY - rect.top) / rect.height) * 2 + 1;
      raycaster.setFromCamera(pointer, camera);

      const intersects = raycaster.intersectObjects(constellationGroup.children, false);
      for (const hit of intersects) {
        if (hit.object.userData.entry) {
          return hit.object.userData.entry;
        }
      }
      return null;
    }

    // ===== 터치/마우스 컨트롤 =====
    let isDragging = false;
    let prevX = 0, prevY = 0;
    let rotX = 0, rotY = 0;
    let velX = 0, velY = 0;
    let dragDist = 0;
    let downX = 0, downY = 0;
    const FRICTION = 0.92;
    const SENSITIVITY = 0.003;

    canvas.addEventListener('pointerdown', (e) => {
      isDragging = true;
      prevX = e.clientX;
      prevY = e.clientY;
      downX = e.clientX;
      downY = e.clientY;
      dragDist = 0;
      velX = 0; velY = 0;
      document.getElementById('hint').style.opacity = '0';
    });

    canvas.addEventListener('pointermove', (e) => {
      if (!isDragging) return;
      const dx = e.clientX - prevX;
      const dy = e.clientY - prevY;
      dragDist += Math.abs(dx) + Math.abs(dy);
      velX = dx * SENSITIVITY;
      velY = dy * SENSITIVITY;
      rotY += velX;
      rotX += velY;
      rotX = Math.max(-Math.PI * 0.45, Math.min(Math.PI * 0.45, rotX));
      prevX = e.clientX;
      prevY = e.clientY;
    });

    canvas.addEventListener('pointerup', (e) => {
      isDragging = false;
      // 드래그가 아닌 클릭/탭인 경우 별자리 감지
      if (dragDist < 10) {
        const entry = raycastConstellation(e.clientX, e.clientY);
        if (entry) {
          showPopup(entry);
        } else {
          popup.classList.add('hidden');
        }
      }
    });
    canvas.addEventListener('pointerleave', () => { isDragging = false; });

    // ===== 애니메이션 루프 =====
    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);

      const dt = clock.getDelta();
      const t = clock.elapsedTime;
      starMat.uniforms.uTime.value = t;

      // 유성 업데이트
      updateMeteors(dt);

      // 관성
      if (!isDragging) {
        velX *= FRICTION;
        velY *= FRICTION;
        rotY += velX;
        rotX += velY;
        rotX = Math.max(-Math.PI * 0.45, Math.min(Math.PI * 0.45, rotX));
      }

      // 자동 회전
      if (!isDragging && Math.abs(velX) < 0.0001 && Math.abs(velY) < 0.0001) {
        rotY += 0.0003;
      }

      // 카메라
      const qY = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 1, 0), rotY);
      const qX = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(1, 0, 0), -rotX);
      camera.quaternion.copy(qY.multiply(qX));

      renderer.render(scene, camera);
    }

    // ===== 리사이즈 =====
    function onResize() {
      const w = canvas.clientWidth;
      const h = canvas.clientHeight;
      renderer.setSize(w, h);
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
    }
    window.addEventListener('resize', onResize);

    // ===== Firebase 실시간 구독 =====
    const q = query(collection(db, 'entries'), orderBy('timestamp', 'desc'));
    onSnapshot(q, (snapshot) => {
      const entries = [];
      snapshot.forEach((doc) => {
        const data = doc.data();
        if (data.stars && data.stars.length > 0) {
          entries.push(data);
        }
      });

      document.getElementById('totalCount').textContent = entries.length;
      buildConstellations(entries);
    });

    animate();
  </script>
</body>
</html>
